<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Snake Clásico</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }

        #score-board {
            font-size: 24px;
            margin-bottom: 15px;
            color: #00ff00;
        }

        canvas {
            border: 4px solid #333;
            background-color: #050505;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        #controls {
            margin-top: 15px;
        }

        button {
            background-color: #222;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 10px 20px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }

        #game-over-text {
            color: #ff0000;
            font-weight: bold;
            display: none;
            margin-top: 10px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="score-board">Puntuación: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div id="game-over-text" id="gameOverMsg">¡FIN DEL JUEGO! Presiona Reiniciar</div>

    <div id="controls">
        <button id="btnStart" onclick="resetGame()">Reiniciar / Empezar</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const gameOverText = document.getElementById("game-over-text");

        // Tamaño de cada cuadrícula (bloque)
        const gridSize = 10;
        const tileCount = canvas.width / gridSize;

        // Variables del juego
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; // Velocidad horizontal inicial
        let dy = 0;        // Velocidad vertical inicial
        let score = 0;
        let gameInterval;
        let gameRunning = false;

        // Escuchar las teclas para mover la serpiente
        document.addEventListener("keydown", changeDirection);

        // Iniciar el juego por primera vez
        resetGame();

        function gameLoop() {
            if (hasGameEnded()) {
                gameOverText.style.display = "block";
                clearInterval(gameInterval);
                gameRunning = false;
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // Limpia el lienzo en cada fotograma
        function clearCanvas() {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Dibuja la serpiente
        function drawSnake() {
            snake.forEach((part, index) => {
                // La cabeza es de un verde más brillante
                ctx.fillStyle = index === 0 ? "#00ff00" : "#00aa00";
                ctx.strokeStyle = "#050505";
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
            });
        }

        // Mueve la serpiente y maneja cuando come la comida
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            const hasEatenFood = snake[0].x === food.x && snake[0].y === food.y;
            if (hasEatenFood) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop(); // Si no come, se quita la cola para simular movimiento
            }
        }

        // Dibuja la manzana/comida
        function drawFood() {
            ctx.fillStyle = "#ff0000";
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
        }

        // Genera comida en una posición aleatoria alineada a la cuadrícula
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;

            // Asegurar que la comida no aparezca encima de la serpiente
            snake.forEach(part => {
                const hasEaten = part.x === food.x && part.y === food.y;
                if (hasEaten) generateFood();
            });
        }

        // Controla las colisiones (paredes o su propio cuerpo)
        function hasGameEnded() {
            // Colisión con el propio cuerpo
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Colisión con las paredes
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // Cambia la dirección con las flechas del teclado (evitando que vaya en dirección opuesta directamente)
        function changeDirection(event) {
            const keyPressed = event.keyCode;
            const LEFT_KEY = 37;
            const UP_KEY = 38;
            const RIGHT_KEY = 39;
            const DOWN_KEY = 40;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -gridSize;
                dy = 0;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -gridSize;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = gridSize;
                dy = 0;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = gridSize;
            }
        }

        // Reinicia todas las variables para una nueva partida
        function resetGame() {
            snake = [
                { x: 160, y: 200 },
                { x: 140, y: 200 },
                { x: 120, y: 200 }
            ];
            score = 0;
            dx = gridSize;
            dy = 0;
            scoreElement.innerText = score;
            gameOverText.style.display = "none";
            generateFood();
            
            clearInterval(gameInterval);
            // El juego corre a una velocidad fija de 100 milisegundos por fotograma
            gameInterval = setInterval(gameLoop, 100);
            gameRunning = true;
        }
    </script>
</body>
</html>
